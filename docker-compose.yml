services:
  postgres:
    image: postgres:16-alpine
    container_name: media_for_you_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_for_you
    ports:
      - "15432:5432"
    volumes:
      - media_for_you_pgdata:/var/lib/postgresql/data

volumes:
  media_for_you_pgdata:
