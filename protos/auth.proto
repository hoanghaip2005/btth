syntax = "proto3";

package auth;

message User {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string created_at = 4;
}

message AuthPayload {
  User user = 1;
  string token = 2;
}

message RegisterRequest {
  string full_name = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message TokenRequest {
  string token = 1;
}

message BoolResponse {
  bool value = 1;
}

service AuthService {
  rpc Register(RegisterRequest) returns (AuthPayload);
  rpc Login(LoginRequest) returns (AuthPayload);
  rpc Me(TokenRequest) returns (User);
  rpc Logout(TokenRequest) returns (BoolResponse);
}
